org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.parallel=true
org.gradle.caching=true

android.useAndroidX=true
android.nonTransitiveRClass=true

# AGP 9 defaults BuildConfig and resValues to disabled, so no explicit config
# is needed (and the old android.defaults.buildfeatures.* flags were removed).
# If a module ever needs them, enable per-module via buildFeatures { ... }.
